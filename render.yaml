services:
  - type: web
    name: agenda-sga
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python -c "import os, django; os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings'); django.setup(); from django.contrib.auth import get_user_model; User = get_user_model(); username = os.environ.get('SUPERUSER_CPF', '12345678909'); email = os.environ.get('SUPERUSER_EMAIL', 'admin@example.com'); password = os.environ.get('SUPERUSER_PASSWORD', 'AdminPassword123'); User.objects.filter(username=username).exists() or User.objects.create_superuser(username, email, password)" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DB_NAME
        fromDatabase:
          name: agenda-sga-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: agenda-sga-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: agenda-sga-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: agenda-sga-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: agenda-sga-db
          property: port

databases:
  - name: agenda-sga-db
    databaseName: agenda_sga_db
    plan: free
