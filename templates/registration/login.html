{% extends "base.html" %}

{% block title %}Entrar | Agenda SGA{% endblock %}

{% block content %}
  <section class="login-card">
    <h1 class="login-title">Entrar</h1>
    <p class="login-text">Acesse o sistema para gerenciar UBS, cidadãos e agendamentos.</p>

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field-group">
        <label class="field-label" for="id_username">CPF</label>
        <input class="field-input" type="text" name="username" autofocus autocomplete="username" inputmode="numeric" placeholder="Digite seu CPF" required id="id_username" data-cpf-mask>
      </div>

      <div class="field-group">
        <label class="field-label" for="id_password">Senha</label>
        <input class="field-input" type="password" name="password" autocomplete="current-password" required id="id_password">
      </div>

      <button class="button-primary" type="submit">Entrar</button>
    </form>
  </section>
{% endblock %}
